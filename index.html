<!DOCTYPE html>
<html lang="ms">
<head>
    <link rel="icon" type="image/png" href="logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hariz Study System (Ultra Secure)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #06080e;
      color: #b8cce0;
      display: flex;
      flex-direction: column; /* Ditukar supaya header berada di atas, login di tengah */
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    /* HEADER BARU DI ATAS SEKALI BELAH KIRI */
    .site-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 30px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      pointer-events: none; /* Supaya tidak mengganggu klik elemen lain */
    }

    .brand-logo {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff; /* Teks warna putih */
      letter-spacing: 1.5px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .brand-logo::after {
      content: ".";
      color: #00e676; /* Titik warna hijau terang/neon */
      font-size: 32px;
      line-height: 0;
    }

    .login-container {
      background: #0a0d16;
      border: 1px solid #202c40;
      padding: 30px;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 1; /* Memastikan kotak login sentiasa di atas lapisan lain */
    }
    h2 { color: #fff; margin-bottom: 8px; font-size: 24px; text-align: center; }
    p { color: #5a7090; font-size: 14px; text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #4da6ff; letter-spacing: 1px; }
    input {
      width: 100%;
      background: #0e1220;
      border: 1px solid #182030;
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4da6ff; }
    button {
      width: 100%;
      background: #4da6ff;
      color: #06080e;
      border: none;
      padding: 12px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7dd3fc; }
    .error-msg {
      color: #ff5252;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
      background: rgba(255,82,82,0.1);
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,82,82,0.2);
    }
    .loading { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="brand-logo">HRZ</div>
</header>

<div class="login-container">
  <h2>Sistem Nota Network+</h2>
  <p>Akses Dilindungi PBKDF2 + Salt</p>
  
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" id="submitBtn">Masuk Sistem ➔</button>
    <div id="errorMsg" class="error-msg">Password salah! Akses dinafikan.</div>
  </form>
</div>

<script>
  // Konfigurasi keselamatan asal (Tidak diusik)
const SECURITY_CONFIG = {
  saltHex: "626f6e656361616d62616c616275",
  iterations: 100000,
  expectedHashHex: "1a4f81f3ba81dc1c520c03eacd858c272b28fdc83636b9fbd90d54b86e721c80"
};

  function hexToBuffer(hex) {
    const pairs = hex.match(/[\da-f]{2}/gi);
    return new Uint8Array(pairs.map(h => parseInt(h, 16)));
  }

  function bufferToHex(buffer) {
    return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function derivePBKDF2(password, saltHex, iterations) {
    const encoder = new TextEncoder();
    const passwordBuffer = encoder.encode(password);
    const saltBuffer = hexToBuffer(saltHex);

    const baseKey = await crypto.subtle.importKey(
      "raw", passwordBuffer, "PBKDF2", false, ["deriveBits"]
    );

    const derivedBits = await crypto.subtle.deriveBits(
      {
        name: "PBKDF2",
        salt: saltBuffer,
        iterations: iterations,
        hash: "SHA-256"
      },
      baseKey,
      256
    );

    return bufferToHex(derivedBits);
  }

  async function handleLogin(e) {
    e.preventDefault();
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    const inputPass = passwordInput.value;

    submitBtn.disabled = true;
    submitBtn.textContent = "Menyemak Sekuriti...";
    submitBtn.classList.add('loading');
    errorMsg.style.display = 'none';

    try {
      const computedHashHex = await derivePBKDF2(inputPass, SECURITY_CONFIG.saltHex, SECURITY_CONFIG.iterations);

      if (computedHashHex === SECURITY_CONFIG.expectedHashHex) {
        sessionStorage.setItem('hariz_auth_session', 'authenticated_true');
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.style.display = 'block';
        passwordInput.value = '';
      }
    } catch (err) {
      console.error(err);
      alert("Ralat sekuriti dikesan pada browser.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Masuk Sistem ➔";
      submitBtn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
