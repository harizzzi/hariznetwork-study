ance that has failed to start up properly?","options":["Crash cart","Jump box","Secure Shell","Out-of-band management"],"answer":3},{"num":15,"q":"Which of the following attacks utilizes a network packet that contains multiple network tags?","options":["MAC flooding","VLAN hopping","DNS spoofing","ARP poisoning"],"answer":1},{"num":16,"q":"A network administrator is configuring a new switch and wants to connect two ports to the core switch to ensure redundancy. Which of the following configurations would meet this requirement?","options":["Full duplex","802.1Q tagging","Native VLAN","Link aggregation"],"answer":3},{"num":17,"q":"Which of the following ports is used for secure email?","options":["25","110","143","587"],"answer":3},{"num":18,"q":"A client wants to increase overall security after a recent breach. Which of the following would be best to implement? (Choose two.)","options":["Least privilege network access","Dynamic inventories","Central policy management","Zero-touch provisioning E. Configuration drift prevention F. Subnet range limits"],"answer":0},{"num":19,"q":"Which of the following is a cost-effective advantage of a split-tunnel VPN?","options":["Web traffic is filtered through a web filler.","More bandwidth is required on the company's internet connection.","Monitoring detects insecure machines on the company's network.","Cloud-based traffic flows outside of the company's network."],"answer":3},{"num":20,"q":"A network technician is troubleshooting a web application's poor performance. The office has two internet links that share the traffic load. Which of the following tools should the technician use to determine which link is being used for the web application?","options":["netstat","nslookup","ping","tracert"],"answer":3},{"num":21,"q":"Which of the following attacks can cause users who are attempting to access a company website to be directed to an entirely different website?","options":["DNS poisoning","Denial-of-service","Social engineering", n connect to the switch. Which of the following should the administrator do?","options":["Configure ACLs.","Implement a captive portal.","Enable port security.","Disable unnecessary services."],"answer":2},{"num":29,"q":"A customer needs six usable IP addresses. Which of the following best meets this requirement?","options":["255.255.255.128","255.255.255.192","255.255.255.224","255.255.255.240"],"answer":3},{"num":30,"q":"A user reports having intermittent connectivity issues to the company network. The network configuration for the user reveals the following: IP address: 192.168.1.10 Subnet mask: 255.255.255.0 Default gateway: 192.168.1.254 The network switch shows the following ARP table: Which of the following is the most likely cause of the user's connection issues?","options":["A port with incorrect VLAN assigned","A switch with spanning tree conflict","Another PC with manually configured IP","A router with overlapping route tables"],"answer":2},{"num":31,"q":"Which of the following is created to illustrate the effectiveness of wireless networking coverage in a building?","options":["Logical diagram","Layer 3 network diagram","Service-level agreement","Heat map"],"answer":3},{"num":32,"q":"Which of the following cloud deployment models is most commonly associated with multitenancy and is generally offered by a service provider?","options":["Private","Community","Public","Hybrid"],"answer":2},{"num":33,"q":"A network administrator needs to create an SVI on a Layer 3-capable device to separate voice and data traffic. Which of the following best explains this use case?","options":["A physical interface used for trunking logical ports","A physical interface used for management access","A logical interface used for the routing of VLANs","A logical interface used when the number of physical ports is insufficient"],"answer":2},{"num":34,"q":"A network administrator is performing a refresh of a wireless environment. As the APs are being placed, they overlap a little bit with each other. Which of the following 2.4GHz channels should be selected to ensure that they do not conflict?","options":["1, 3, 5","1, 6, 11","2, 6, 10","3, 6, 9"],"answer":1},{"num":35,"q":"Which of the following network cables involves bouncing light off of protective cladding?","options":["Twinaxial","Coaxial","Single-mode","Multimode"],"answer":3},{"num":36,"q":"Which of the following would allow a network administrator to analyze attacks coming from the internet without affecting latency?","options":["IPS","IDS","Load balancer","Firewall"],"answer":1},{"num":37,"q":"A technician is troubleshooting wireless connectivity near a break room. Whenever a user turns on the microwave, connectivity to the user's laptop is lost. Which of the following frequency bands is the laptop most likely using?","options":["2.4GHz","5GHz","6GHz","900MHz"],"answer":0},{"num":38,"q":"A network administrator needs to implement routing capabilities in a hypervisor. Which of the following should the administrator most likely implement?","options":["VPC","Firewall","NFV","IaaS"],"answer":2},{"num":39,"q":"A network technician needs to install patch cords from the UTP patch panel to the access switch for a newly occupied set of offices. The patch panel is not labeled for easy jack identification. Which of the following tools provides the easiest way to identify the appropriate patch panel port?","options":["Toner","Laptop","Cable tester","Visual fault locator"],"answer":0},{"num":40,"q":"A network administrator received complaints of intermittent network connectivity issues. The administrator investigates and finds that the network design contains potential loop scenarios. Which of the following should the administrator do?","options":["Enable spanning tree.","Configure port security.","Change switch port speed limits.","Enforce 802.1Q tagging."],"answer":0},{"num":41,"q":"Which of the following routing technologies uses a successor and a feasible successor?","options":["IS-IS","OSPF antly disconnecting and have slow speeds. Upon inspection, the support agent sees that the user's coaxial modem has a signal power of -97dB. Which of the following should the support agent recommend to troubleshoot the issue?","options":["Removing any splitters connected to the line","Switching the devices to wireless","Moving the devices closer to the modem","Lowering the network speed"],"answer":0},{"num":60,"q":"Which of the following does OSPF use to communicate routing updates?","options":["Unicast","Anycast","Multicast","Broadcast"],"answer":2},{"num":61,"q":"A storage network requires reduced overhead and increased efficiency for the amount of data being sent. Which of the following should an engineer most likely configure to meet these requirements?","options":["Link speed","Jumbo frames","QoS","802.1q tagging"],"answer":1},{"num":62,"q":"A security administrator is creating a new firewall object for a device with IP address 192.168.100.1/25. However, the firewall software only uses dotted decimal notation in configuration fields. Which of the following is the correct subnet mask to use?","options":["255.255.254.0","255.255.255.1","255.255.255.128","255.255.255.192"],"answer":2},{"num":63,"q":"Which of the following disaster recovery metrics describes the average length of time a piece of equipment can be expected to operate normally?","options":["RPO","RTO","MTTR","MTBF"],"answer":3},{"num":64,"q":"A network administrator logs on to a router and sees an interface with an IP address of 10.61.52.34 255.255.255.252. Which of the following best describes how this interface IP address is being used?","options":["As a point-to-point connection","To connect to the internet","As a virtual address for redundancy","For out-of-band management"],"answer":0},{"num":65,"q":"A network technician is troubleshooting a faulty NIC and tests the theory. Which of the following should the technician do next?","options":["Develop a theory.","Establish a plan of action.","Implemen ers with an extended footprint that allows connections from multiple devices within a designated WLAN?","options":["Router","Switch","Access point","Firewall"],"answer":2},{"num":73,"q":"An administrator is configuring a switch that will be placed in an area of the office that is accessible to customers. Which of the following is the best way for the administrator to mitigate unknown devices from connecting to the network?","options":["SSE","ACL","Perimeter network","802.1X"],"answer":3},{"num":74,"q":"Which of the following diagrams would most likely include specifications about fiber connector types?","options":["Logical","Physical","Rack","Routing"],"answer":1},{"num":75,"q":"Which of the following is the most likely reason an insurance brokerage would enforce VPN usage?","options":["To encrypt sensitive data in transit","To secure the endpoints","To maintain contractual agreements","To comply with data retention requirements"],"answer":0},{"num":76,"q":"An organization moved its DNS servers to new IP addresses. After this move, customers are no longer able to access the organization's website. Which of the following DNS entries should be updated?","options":["AAA","CNAME","MX","NS"],"answer":3},{"num":77,"q":"Which of the following are environmental factors that should be considered when installing equipment in a building? (Choose two.)","options":["Fire suppression system","UPS location","Humidity control","Power load E. Floor construction type F. Proximity to nearest MDF"],"answer":0},{"num":78,"q":"A customer lost the connection to the telephone system. The administration console is configured with multiple network interfaces and is connected to multiple switches. The network administrator troubleshoots and verifies the following: The support team is able to connect remotely to the administration console. Rebooting the switch shows solid link and activity lights even on unused ports. Rebooting the telephone system does not bring the system back online. The co const QUIZ_SIZE = 10;
let pool = [], current = 0, score = 0;
let answered = [], selected = [];
let sessionCount = parseInt(localStorage.getItem('qz_sessions')||'0');
let totalCorrect = parseInt(localStorage.getItem('qz_correct')||'0');

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function newQuiz(){
  pool = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  current = 0; score = 0;
  answered = new Array(QUIZ_SIZE).fill(false);
  selected = new Array(QUIZ_SIZE).fill(-1);
  document.getElementById('scoreCard').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('progFill').parentElement.style.display='block';
  document.getElementById('progLabel').style.display='block';
  render();
}

function retryQuiz(){
  current=0; score=0;
  answered=new Array(QUIZ_SIZE).fill(false);
  selected=new Array(QUIZ_SIZE).fill(-1);
  document.getElementById('scoreCard').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('progFill').parentElement.style.display='block';
  document.getElementById('progLabel').style.display='block';
  render();
}

function render(){
  const q = pool[current];
  const lets=['A','B','C','D'];
  const ans = answered[current];
  const sel = selected[current];

  const opts = q.options.map((o,i)=>{
    let cls='';
    if(ans){
      if(i===q.answer) cls = i===sel ? 'correct' : 'reveal';
      else if(i===sel) cls='wrong';
    }
    return `<button class="opt ${cls}" onclick="pick(${i})" ${ans?'disabled':''}><span class="ltr">${lets[i]}</span>${o}</button>`;
  }).join('');

  let fb='';
  if(ans){
    const ok = sel===q.answer;
    fb=`<div class="feedback ${ok?'fb-ok':'fb-bad'}" style="display:block">
      ${ok?'✅ Betul!':'❌ Salah. Jawapan: <strong>'+lets[q.answer]+'. '+q.options[q.answer]+'</strong>'}
    </div>`;
  }

  document.getElementById('quizArea').innerHTML=`
    <div class="card">
      <div class="q-meta">Soalan ${current+1} / ${QUIZ_SIZE} &nbsp;·&nbsp; Q#${q.num}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>
      ${fb}
    </div>
    <div class="nav">
      <button class="btn btn-s" onclick="go(-1)" ${current===0?'disabled':''}>← Sebelum</button>
      ${current<QUIZ_SIZE-1
        ?`<button class="btn btn-p" onclick="go(1)" ${!ans?'disabled':''}>Seterusnya →</button>`
        :`<button class="btn btn-p" onclick="finish()" ${!answered.every(Boolean)?'disabled':''}>Lihat Keputusan 🏁</button>`
      }
    </div>`;

  document.getElementById('progFill').style.width=((current+1)/QUIZ_SIZE*100)+'%';
  document.getElementById('progLabel').textContent=`${current+1} / ${QUIZ_SIZE}`;
}

function pick(i){
  if(answered[current]) return;
  selected[current]=i;
  answered[current]=true;
  if(i===pool[current].answer) score++;
  render();
}

function go(d){
  current+=d;
  render();
}

function finish(){
  sessionCount++;
  totalCorrect+=score;
  try{
    localStorage.setItem('qz_sessions',sessionCount);
    localStorage.setItem('qz_correct',totalCorrect);
  }catch(e){}

  document.getElementById('quizArea').style.display='none';
  document.getElementById('progFill').parentElement.style.display='none';
  document.getElementById('progLabel').style.display='none';
  document.getElementById('scoreCard').style.display='block';

  const pct=Math.round(score/QUIZ_SIZE*100);
  document.getElementById('scoreRing').textContent=pct+'%';
  document.getElementById('cCount').textContent=score;
  document.getElementById('wCount').textContent=QUIZ_SIZE-score;

  let t,m;
  if(pct>=80){t='🎉 Gempak! Dah ready!';m='Performance power! Keep it up dan cover topik yang silap tadi.';}
  else if(pct>=60){t='👍 Boleh tahan!';m='Ada ruang untuk improve. Review jawapan salah dan cuba lagi.';}
  else{t='📚 Kena study lagi!';m='5 hari lagi — fokus topik yang salah dan drill lebih banyak soalan!';}

  document.getElementById('scoreTitle').textContent=t;
  document.getElementById('scoreMsg').textContent=m;
  document.getElementById('sessionBadge').textContent=`Sesi #${sessionCount} · Jumlah betul setakat ini: ${totalCorrect}`;
}

newQuiz();

    if (sessionStorage.getItem('hariz_auth_session') !== 'authenticated_true') {
      window.location.replace('index.html');
    }
    function logout() {
      sessionStorage.removeItem('hariz_auth_session');
      window.location.replace('index.html');
    }

</script>
